services:
  unifi-wallboard:
    image: samuelstreets/unifi-gateway-monitor:latest
    container_name: unifi-monitor
    ports:
      - "8082:8080"
    volumes:
      - unifi_alert_data:/unifi_data
    environment:
      # --- Modern Site Manager (unifi.ui.com) ---
      - UNIFI_API_KEY=YOUR_UNIFI_API_KEY_HERE
      
      # --- Classic Cloud Controller ---
      - CLASSIC_URL=https://your.classic.controller:8443
      - CLASSIC_USER=YOUR_USERNAME
      - CLASSIC_PASS=YOUR_PASSWORD
      
      # --- SMTP Email Alerts ---
      - SMTP_SERVER=your.smtp.server.ip
      - SMTP_PORT=25
      - SMTP_USER=your_smtp_user
      - SMTP_PASS=your_smtp_password
      - EMAIL_FROM=alerts@yourdomain.com
      - EMAIL_TO=reports@yourdomain.com
      
      # --- Exclusions (Comma-separated list of exact site names) ---
      - IGNORE_SITES=Test Site 1, Lab Network, Decommissioned Office
      
      # --- Python Environment ---
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/data.json')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always

# Required for Portainer/Docker to manage persistent storage
volumes:
  unifi_alert_data:
