<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniFi Gateway Monitor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Ccircle fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' cx='24' cy='24' r='21.5'/%3E%3Ccircle fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' cx='24' cy='24' r='8.7'/%3E%3Cpath fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' d='M22.37,21.93v3.31a1.62,1.62,0,1,0,3.23,0V21.93'/%3E%3C/svg%3E">
    <style>
        :root { --crit: #ff3b30; --warn: #ffcc00; --good: #4cd964; --bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; margin: 0; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .harvest-time { font-size: 1.2rem; font-weight: bold; color: #00A1E4; }
        
        .header-controls { display: flex; align-items: center; gap: 20px; }
        .filter-toggle { font-size: 0.85rem; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .filter-toggle input { cursor: pointer; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            padding: 20px; 
            border-radius: 12px; 
            background: var(--card-bg); 
            border-left: 10px solid; 
            transition: transform 0.2s, background-color 0.2s; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            cursor: pointer; /* Makes the whole card feel clickable */
        }
        
        .card:hover {
            background: #1e1e1e; /* Slight hover effect */
        }
        
        .Red { border-color: var(--crit); }
        .Yellow { border-color: var(--warn); }
        .Green { border-color: var(--good); opacity: 0.7; }
        .Grey { border-color: #666; opacity: 0.5; }
        .hidden { display: none !important; }
        
        .site-name { 
            font-size: 1.4rem; 
            font-weight: bold; 
            margin-bottom: 2px; 
            line-height: 1.2; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .site-meta { 
            font-size: 0.75rem; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .isp-badge { color: #00A1E4; }

        .issue-list { margin-bottom: 15px; }
        .issue-item { margin-bottom: 8px; padding: 10px 12px; border-radius: 4px; border-left: 4px solid; }
        .sev-critical { border-left-color: var(--crit); background: rgba(255, 59, 48, 0.15); }
        .sev-warning { border-left-color: var(--warn); background: rgba(255, 204, 0, 0.1); }
        .sev-historical { border-left-color: #666; background: rgba(102, 102, 102, 0.15); color: #ccc; }

        .instruction-box { display: flex; justify-content: space-between; align-items: center; }
        .instruction { font-size: 0.9rem; font-weight: bold; }
        .srv-time { font-size: 0.8rem; opacity: 0.7; }

        details { 
            margin-top: auto; 
            border-top: 1px solid #333; 
            padding-top: 10px; 
            cursor: pointer; 
        }
        summary { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; list-style: none; outline: none; }
        
        .inv-list { 
            margin-top: 10px; 
            font-size: 0.8rem; 
            max-height: 180px; 
            overflow-y: auto;  
            padding-right: 5px;
            cursor: default; /* Revert cursor for the inner list */
        }
        .inv-list::-webkit-scrollbar { width: 6px; }
        .inv-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .inv-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .inv-list::-webkit-scrollbar-thumb:hover { background: #666; }

        .inv-row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .status-ONLINE { color: var(--good); }
        .status-OFFLINE, .status-DISCONNECTED { color: var(--crit); font-weight: bold; }
        .update-icon { color: #00A1E4; font-size: 0.85rem; margin-left: 4px; text-decoration: none; }
        .offline-time { font-size: 0.75rem; color: #888; font-weight: normal; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="header-container">
        <div style="display: flex; align-items: center; gap: 15px;">
            <svg width="36" height="36" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <circle fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" cx="24" cy="24" r="21.5"/>
                <circle fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" cx="24" cy="24" r="8.7"/>
                <path fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M22.37,21.93v3.31a1.62,1.62,0,1,0,3.23,0V21.93"/>
            </svg>
            <h1 style="margin:0; color:#ddd; letter-spacing:3px; font-size: 1.6rem;">UNIFI SITE MONITOR</h1>
        </div>
        
        <div class="header-controls">
            <label class="filter-toggle">
                <input type="checkbox" id="hide-healthy" onchange="renderGrid()"> 
                Hide Healthy Sites
            </label>
            <div style="text-align:right">
                <div id="harvest-clock" class="harvest-time">--:--:--</div>
                <div style="font-size:0.7rem; color:#666; text-transform:uppercase;">Last API Harvest</div>
            </div>
        </div>
    </div>

    <div id="grid" class="grid">Awaiting Data from UniFi...</div>

    <script>
        let currentData = [];

        async function fetchData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const raw = await res.json();
                document.getElementById('harvest-clock').innerText = raw.timestamp || '--:--:--';
                if (raw.sites) {
                    currentData = raw.sites;
                    renderGrid();
                }
            } catch (e) { console.error("Dashboard Update Error:", e); }
        }

        // Handle clicking anywhere on the card
        function toggleCard(event, cardElement) {
            // Ignore the click if the user is interacting with the scrollable inventory list inside
            if (event.target.closest('.inv-list')) return;
            // The browser already handles clicks directly on the <summary> element
            if (event.target.tagName === 'SUMMARY') return;

            const details = cardElement.querySelector('details');
            if (details) {
                details.open = !details.open;
            }
        }

        function renderGrid() {
            const hideHealthy = document.getElementById('hide-healthy').checked;
            
            if (currentData.length === 0) {
                document.getElementById('grid').innerHTML = "<div style='grid-column:1/-1;text-align:center;color:#666;'>No active sites found.</div>";
                return;
            }

            document.getElementById('grid').innerHTML = currentData.map(site => {
                const isHidden = hideHealthy && site.Status === 'Green' ? 'hidden' : '';
                return `
                <div class="card ${site.Status} ${isHidden}" onclick="toggleCard(event, this)">
                    <div class="site-name" title="${site.SiteName}">${site.SiteName}</div>
                    <div class="site-meta" title="${site.Model} ${site.ISP ? `- ${site.ISP}` : ''}">
                        ${site.Model} ${site.ISP ? `&nbsp;&nbsp;•&nbsp;&nbsp;<span class="isp-badge">📡 ${site.ISP}</span>` : ''}
                    </div>
                    
                    <div class="issue-list">
                        ${(!site.IssuesList || site.IssuesList.length === 0) ? '<div style="color:var(--good); font-size:0.8rem;">✓ Site Healthy</div>' : 
                            site.IssuesList.map(issue => `
                                <div class="issue-item sev-${issue.severity}">
                                    <div class="instruction-box">
                                        <span class="instruction">${issue.label}</span>
                                        <span class="srv-time">${issue.time || ''}</span>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>

                    <details>
                        <summary>Device Inventory (${site.Inventory.length})</summary>
                        <div class="inv-list">
                            ${site.Inventory.length === 0 ? '<div style="color:#666">No devices found.</div>' : 
                                site.Inventory.map(item => `
                                    <div class="inv-row">
                                        <span title="${item.name}">
                                            ${item.name.substring(0, 20)}${item.name.length > 20 ? '...' : ''} 
                                            <small style="color:#666">(${item.model})</small>
                                            ${item.has_update ? '<span class="update-icon" title="Firmware Update Available">⬆️</span>' : ''}
                                        </span>
                                        <span class="status-${item.status}">
                                            ${item.status} 
                                            ${item.offline_duration ? `<span class="offline-time">(${item.offline_duration})</span>` : ''}
                                        </span>
                                    </div>
                                `).join('')}
                        </div>
                    </details>
                </div>
            `}).join('');
        }

        setInterval(fetchData, 30000); 
        fetchData();
    </script>
</body>
</html>
